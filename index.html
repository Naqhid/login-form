<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form - Mohammed Naqhid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-in {
            animation: slideIn 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-purple-800 min-h-screen flex justify-center items-center p-4">
    <div class="w-full">
        <!-- Login Form -->
        <div id="loginForm" class="slide-in bg-white rounded-2xl shadow-2xl p-8 space-y-6 max-w-md mx-auto">
            <div class="text-center">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Welcome</h1>
                <p class="text-indigo-600 font-semibold text-lg">Mohammed Naqhid</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" 
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-600 focus:outline-none transition"
                        required>
                    <div id="usernameError" class="text-red-500 text-sm mt-1 hidden">Username is required</div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" 
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-600 focus:outline-none transition"
                        required>
                    <div id="passwordError" class="text-red-500 text-sm mt-1 hidden">Password is required</div>
                </div>
            </div>

            <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3 rounded-lg hover:shadow-lg transform hover:-translate-y-1 transition">
                Login
            </button>

            <div class="bg-blue-50 border border-blue-200 rounded-lg p-3">
                <p class="text-sm text-blue-800 font-medium">📝 Demo Credentials:</p>
                <p class="text-sm text-blue-700 mt-1"><strong>Username:</strong> naqhid</p>
                <p class="text-sm text-blue-700"><strong>Password:</strong> password123</p>
            </div>
        </div>
    </div>

    <script>
        const VALID_USERNAME = 'naqhid';
        const VALID_PASSWORD = 'password123';

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const usernameError = document.getElementById('usernameError');
            const passwordError = document.getElementById('passwordError');

            // Clear previous errors
            usernameError.classList.add('hidden');
            passwordError.classList.add('hidden');

            let isValid = true;

            // Validation
            if (username === '') {
                usernameError.textContent = 'Username is required';
                usernameError.classList.remove('hidden');
                isValid = false;
            } else if (username !== VALID_USERNAME) {
                usernameError.textContent = 'Invalid username';
                usernameError.classList.remove('hidden');
                isValid = false;
            }

            if (password === '') {
                passwordError.textContent = 'Password is required';
                passwordError.classList.remove('hidden');
                isValid = false;
            } else if (password !== VALID_PASSWORD) {
                passwordError.textContent = 'Invalid password';
                passwordError.classList.remove('hidden');
                isValid = false;
            }

            // If valid, store login state and redirect to portfolio page
            if (isValid) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', username);
                window.location.href = 'portfolio.html';
            }
        }

        // Allow Enter key to submit login form
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
