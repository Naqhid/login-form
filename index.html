<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login Form - Mohammed Naqhid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-in {
            animation: slideIn 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .input-error {
            border-color: #ef4444 !important;
        }

        .focus-ring:focus-visible {
            outline: 3px solid #312e81;
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            .slide-in {
                animation: none;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-purple-800 min-h-screen flex justify-center items-center p-3 sm:p-4">
    <div class="w-full">
        <!-- Login Form -->
        <form id="loginForm" class="slide-in bg-white rounded-2xl shadow-2xl p-5 sm:p-8 lg:p-9 space-y-5 sm:space-y-6 max-w-md lg:max-w-lg mx-auto border border-white/50" novalidate>
            <div class="text-center">
                <h1 class="text-2xl sm:text-3xl lg:text-4xl font-extrabold tracking-tight text-gray-800 mb-2">Welcome</h1>
                <p class="text-indigo-700 font-semibold text-base sm:text-lg lg:text-xl">Mohammed Naqhid</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" 
                        class="focus-ring w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-700 focus:outline-none transition duration-200"
                        autocomplete="username"
                        aria-describedby="usernameError"
                        required>
                    <div id="usernameError" class="text-red-500 text-sm mt-1 hidden" role="alert">Username is required</div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Enter your password" 
                            class="focus-ring w-full px-4 py-3 pr-12 border-2 border-gray-300 rounded-lg focus:border-indigo-700 focus:outline-none transition duration-200"
                            autocomplete="current-password"
                            aria-describedby="passwordError"
                            required>
                        <button id="togglePasswordButton" type="button" class="focus-ring absolute right-3 top-1/2 -translate-y-1/2 text-xs sm:text-sm text-indigo-800 font-semibold hover:text-indigo-950 transition">
                            Show
                        </button>
                    </div>
                    <div id="passwordError" class="text-red-500 text-sm mt-1 hidden" role="alert">Password is required</div>
                </div>
            </div>

            <button id="loginButton" type="submit" class="focus-ring w-full bg-gradient-to-r from-indigo-700 to-purple-700 text-white font-bold py-3 rounded-lg hover:shadow-lg transform hover:-translate-y-0.5 transition duration-200">
                Login
            </button>
            <div id="statusMessage" class="text-sm text-gray-700 text-center" aria-live="polite"></div>

            <div class="bg-blue-50 border border-blue-300 rounded-lg p-3 sm:p-4">
                <p class="text-sm text-blue-900 font-semibold">📝 Demo Credentials:</p>
                <p class="text-sm text-blue-800 mt-1"><strong>Username:</strong> naqhid</p>
                <p class="text-sm text-blue-800"><strong>Password:</strong> password123</p>
            </div>
        </form>
    </div>

    <script>
        const AUTH_TOKEN_KEY = 'authToken';
        const AUTH_USER_KEY = 'authUser';
        const AUTH_EXPIRY_KEY = 'authExpiry';
        const AUTH_LOGIN_AT_KEY = 'authLoginAt';
        const SESSION_DURATION_MS = 30 * 60 * 1000;
        const VALID_USERNAME = 'naqhid';
        const VALID_PASSWORD = 'password123';
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');
        const statusMessage = document.getElementById('statusMessage');
        const loginButton = document.getElementById('loginButton');
        const togglePasswordButton = document.getElementById('togglePasswordButton');

        function clearAuth() {
            sessionStorage.removeItem(AUTH_TOKEN_KEY);
            sessionStorage.removeItem(AUTH_USER_KEY);
            sessionStorage.removeItem(AUTH_EXPIRY_KEY);
            sessionStorage.removeItem(AUTH_LOGIN_AT_KEY);
        }

        function hasValidSession() {
            const token = sessionStorage.getItem(AUTH_TOKEN_KEY);
            const username = sessionStorage.getItem(AUTH_USER_KEY);
            const expiry = Number(sessionStorage.getItem(AUTH_EXPIRY_KEY));

            if (!token || !username || !Number.isFinite(expiry)) {
                clearAuth();
                return false;
            }

            if (Date.now() > expiry) {
                clearAuth();
                return false;
            }

            return true;
        }

        function createSession(username) {
            const tokenBytes = new Uint32Array(4);
            crypto.getRandomValues(tokenBytes);
            const token = Array.from(tokenBytes, (num) => num.toString(16)).join('');
            const expiry = String(Date.now() + SESSION_DURATION_MS);

            sessionStorage.setItem(AUTH_TOKEN_KEY, token);
            sessionStorage.setItem(AUTH_USER_KEY, username);
            sessionStorage.setItem(AUTH_EXPIRY_KEY, expiry);
            sessionStorage.setItem(AUTH_LOGIN_AT_KEY, String(Date.now()));
        }

        if (hasValidSession()) {
            window.location.replace('portfolio.html');
        }

        function handleLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // Clear previous errors
            usernameError.classList.add('hidden');
            passwordError.classList.add('hidden');
            usernameInput.classList.remove('input-error');
            passwordInput.classList.remove('input-error');
            statusMessage.textContent = '';

            let isValid = true;

            // Validation
            if (username === '') {
                usernameError.textContent = 'Username is required';
                usernameError.classList.remove('hidden');
                usernameInput.classList.add('input-error');
                isValid = false;
            } else if (username !== VALID_USERNAME) {
                usernameError.textContent = 'Invalid username';
                usernameError.classList.remove('hidden');
                usernameInput.classList.add('input-error');
                isValid = false;
            }

            if (password === '') {
                passwordError.textContent = 'Password is required';
                passwordError.classList.remove('hidden');
                passwordInput.classList.add('input-error');
                isValid = false;
            } else if (password !== VALID_PASSWORD) {
                passwordError.textContent = 'Invalid password';
                passwordError.classList.remove('hidden');
                passwordInput.classList.add('input-error');
                isValid = false;
            }

            // If valid, store login state and redirect to portfolio page
            if (isValid) {
                loginButton.disabled = true;
                loginButton.classList.add('opacity-70', 'cursor-not-allowed');
                statusMessage.textContent = 'Signing in...';
                createSession(username);
                window.location.replace('portfolio.html');
            } else {
                statusMessage.textContent = 'Please fix the highlighted fields.';
            }
        }

        togglePasswordButton.addEventListener('click', function() {
            const hidden = passwordInput.type === 'password';
            passwordInput.type = hidden ? 'text' : 'password';
            togglePasswordButton.textContent = hidden ? 'Hide' : 'Show';
        });

        usernameInput.addEventListener('input', function() {
            usernameInput.classList.remove('input-error');
            usernameError.classList.add('hidden');
        });

        passwordInput.addEventListener('input', function() {
            passwordInput.classList.remove('input-error');
            passwordError.classList.add('hidden');
        });

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            handleLogin();
        });
    </script>
</body>
</html>
